<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ingressos</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <i class="fas fa-ticket"></i>
                Ingressos
            </a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="filmes.html">Filmes</a>
                <a href="teatros.html">Teatros</a>
                <a href="shows.html">Shows</a>
            </nav>
            <div class="header-actions">
                <button class="btn-cart" onclick="viewCart()"><i class="fas fa-shopping-cart"></i></button>
                <a href="login.html" class="btn-login">Login</a>
                <button class="hamburger" onclick="toggleMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <section class="login-section">
        <div class="login-container">
            <div class="login-box">
                <div class="login-header">
                    <i class="fas fa-user-circle"></i>
                    <h1>Faça seu Login</h1>
                    <p>Acesse sua conta para continuar</p>
                </div>

                <form class="login-form">
                    <div class="form-group">
                        <label for="email">Email ou Usuário</label>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="seu@email.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Senha</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox">
                            <span>Lembrar-me</span>
                        </label>
                        <a href="#" class="forgot-password">Esqueci minha senha</a>
                    </div>

                    <button type="submit" class="btn-submit">Entrar</button>
                </form>

                <div class="login-divider">
                    <span>ou conecte-se com</span>
                </div>

                <div class="social-login">
                    <button class="social-btn google" type="button">
                        <i class="fab fa-google"></i>
                    </button>
                    <button class="social-btn facebook" type="button">
                        <i class="fab fa-facebook"></i>
                    </button>
                    <button class="social-btn github" type="button">
                        <i class="fab fa-github"></i>
                    </button>
                </div>

                <div class="login-footer">
                    <p>Não tem uma conta? <a href="#">Criar uma agora</a></p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Ingressos. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="index.js"></script>
</body>
</html>
